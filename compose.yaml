services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: school-management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0508"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d school-management"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    ports:
      - "6379:6379"
