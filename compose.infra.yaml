# Optional: Postgres + Redis only (empty DB — NOT your old Windows data).
# Prefer docker-compose.yml which uses host Postgres with your existing data.
#
# If you start this, it binds port 5432 and can block Windows Postgres.
#   docker compose -f compose.infra.yaml up -d
#   docker compose -f compose.infra.yaml down

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: school-management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0508"
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d school-management"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    ports:
      - "6379:6379"
