<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | School Management</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="shortcut icon" th:href="@{/favicon.svg}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Khmer&family=Moul&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script>
        (function () {
            try {
                var t = localStorage.getItem('sm-theme') === 'dark' ? 'dark' : 'light';
                var l = localStorage.getItem('sm-lang') === 'km' ? 'km' : 'en';
                document.documentElement.setAttribute('data-theme', t);
                document.documentElement.setAttribute('data-lang', l);
                document.documentElement.lang = l;
            } catch (e) {}
        })();
    </script>
</head>

<body class="auth-body">
    <div class="prefs-switch-login">
        <div th:replace="~{components/prefs-switch :: prefs}"></div>
    </div>

    <main class="auth-card">
        <p class="brand" data-i18n="brand.name">School Management</p>
        <h1 class="header-login" data-i18n="login.title">Admin sign in</h1>

        <div th:if="${error != null}" class="alert error" th:text="${error}">Error</div>
        <div th:if="${error == null and param.error != null}" class="alert error" data-i18n="login.error">Invalid email or password.</div>
        <div th:if="${param.logout}" class="alert ok" data-i18n="login.logout">You have been logged out.</div>

        <form th:action="@{/login}" method="post">
            <label for="username" data-i18n="login.email">Email</label>
            <input id="username" name="username" type="email" required placeholder="admin@school.com" autocomplete="username">

            <label for="password" data-i18n="login.password">Password</label>
            <div class="password-field">
                <input id="password" name="password" type="password" required placeholder="••••••••" autocomplete="current-password">
                <button type="button"
                        class="password-toggle"
                        id="togglePassword"
                        aria-label="Show password"
                        aria-controls="password"
                        aria-pressed="false"
                        title="Show password">
                    <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
                        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.77 21.77 0 0 1 5.06-5.94"></path>
                        <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-2.16 3.19"></path>
                        <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </button>
            </div>

            <button type="submit" class="login-submit" data-i18n="login.submit">Login</button>
        </form>
    </main>
    <script th:src="@{/js/prefs.js}"></script>
    <script th:src="@{/js/password-toggle.js}"></script>
</body>

</html>
