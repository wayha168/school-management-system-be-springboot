<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="page-toolbar">
        <div class="page-toolbar-main">
            <div>
                <h2 class="page-heading" th:text="${schoolClass.name}">Class</h2>
                <p class="muted"
                   th:text="${(schoolClass.grade ?: '—') + ' · ' + (schoolClass.generationCode ?: '—') + ' · ' + (schoolClass.schoolName ?: '')}">
                    Grade · Generation
                </p>
            </div>
            <div class="page-toolbar-actions row">
                <a class="btn btn-ghost" th:href="@{/admin/attendance(tab='classes')}">Back</a>
                <a class="btn btn-dark" th:if="${canMark}"
                   sec:authorize="hasAuthority('ATTENDANCE_WRITE')"
                   th:href="@{/admin/attendance/mark(classUuid=${schoolClass.uuid}, date=${selectedDate})}">Mark attendance</a>
            </div>
        </div>
    </div>

    <p class="muted" style="margin-bottom:12px">
        Belongs to:
        <th:block th:if="${!#lists.isEmpty(teachers)}">
            <strong th:each="t, iter : ${teachers}">
                <span th:text="${t.name}">Teacher</span><span th:unless="${iter.last}">, </span>
            </strong>
        </th:block>
        <strong th:if="${#lists.isEmpty(teachers)}">Unassigned</strong>
    </p>

    <form class="filter-bar" method="get"
          th:action="@{/admin/attendance/classes/{id}(id=${schoolClass.uuid})}"
          style="margin-bottom:14px">
        <label>Date
            <input type="date" name="date" th:value="${selectedDate}" onchange="this.form.submit()">
        </label>
    </form>

    <article class="panel-card chart-card" style="margin-bottom:16px">
        <div class="page-intro compact">
            <div>
                <h3 class="section-title">Class attendance · 1 month</h3>
                <p class="muted">Daily P / A / L trend for this class</p>
            </div>
        </div>
        <canvas id="classAttendanceMonthChart"></canvas>
    </article>

    <div class="table-wrap">
        <table class="data-table" id="class-students-table">
            <thead>
            <tr>
                <th>Student</th>
                <th>Email</th>
                <th>Status</th>
                <th>Remark</th>
                <th th:if="${canMark}" sec:authorize="hasAuthority('ATTENDANCE_WRITE')">Quick set</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${students}" th:attr="data-search=${s.name + ' ' + s.email}">
                <td th:text="${s.name}">Name</td>
                <td th:text="${s.email}">email</td>
                <td>
                    <span class="role-badge"
                          th:with="st=${attendanceByUser.containsKey(s.uuid) ? attendanceByUser.get(s.uuid).status : null}"
                          th:text="${st == null ? '—' : (st.name() == 'PRESENT' ? 'P' : (st.name() == 'ABSENT' ? 'A' : (st.name() == 'LATE' ? 'L' : 'E')))}">P</span>
                </td>
                <td th:text="${attendanceByUser.containsKey(s.uuid) and attendanceByUser.get(s.uuid).remark != null}
                              ? ${attendanceByUser.get(s.uuid).remark} : '—'">—</td>
                <td th:if="${canMark}" sec:authorize="hasAuthority('ATTENDANCE_WRITE')">
                    <form th:action="@{/admin/attendance}" method="post" class="filter-bar">
                        <input type="hidden" name="userUuid" th:value="${s.uuid}">
                        <input type="hidden" name="classUuid" th:value="${schoolClass.uuid}">
                        <input type="hidden" name="attendanceDate" th:value="${selectedDate}">
                        <select name="status">
                            <option value="PRESENT"
                                    th:selected="${!attendanceByUser.containsKey(s.uuid) or attendanceByUser.get(s.uuid).status.name() == 'PRESENT'}">P</option>
                            <option value="ABSENT"
                                    th:selected="${attendanceByUser.containsKey(s.uuid) and attendanceByUser.get(s.uuid).status.name() == 'ABSENT'}">A</option>
                            <option value="LATE"
                                    th:selected="${attendanceByUser.containsKey(s.uuid) and attendanceByUser.get(s.uuid).status.name() == 'LATE'}">L</option>
                            <option value="EXCUSED"
                                    th:selected="${attendanceByUser.containsKey(s.uuid) and attendanceByUser.get(s.uuid).status.name() == 'EXCUSED'}">E</option>
                        </select>
                        <button type="submit" class="btn btn-ghost btn-sm">Save</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(students)}">
                <td colspan="5">No students in this class.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <script th:inline="javascript">
        window.__classAttendanceCharts = {
            labels: /*[[${classMonthLabels}]]*/ [],
            present: /*[[${classMonthPresent}]]*/ [],
            absent: /*[[${classMonthAbsent}]]*/ [],
            late: /*[[${classMonthLate}]]*/ []
        };
    </script>
</section>
</body>
</html>
