<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="page-toolbar">
        <div class="page-toolbar-main">
            <div>
                <h2 class="page-heading"
                    th:attr="data-i18n=${staffInbox} ? 'requests.inbox' : 'requests.mine'"
                    th:text="${staffInbox} ? 'Requests inbox' : 'My requests'">Requests</h2>
                <p class="muted" data-i18n="requests.subtitle">Complaints and text requests</p>
            </div>
            <div class="page-toolbar-actions">
                <div class="page-toolbar-left">
                    <input type="search" class="search-input" placeholder="Search..."
                           data-i18n-placeholder="search.generic"
                           data-table-search="requests-table">
                    <form class="filter-bar" method="get" th:action="@{/admin/requests}" th:if="${staffInbox}">
                        <select name="status" onchange="this.form.submit()">
                            <option value="" data-i18n="requests.allStatuses">All statuses</option>
                            <option th:each="st : ${statuses}" th:value="${st}"
                                    th:selected="${selectedStatus != null and selectedStatus == st}"
                                    th:text="${st}">OPEN</option>
                        </select>
                    </form>
                </div>
                <div class="page-toolbar-right">
                    <a class="btn btn-dark" th:href="@{/admin/requests/new}" data-i18n="requests.new">New request</a>
                </div>
            </div>
        </div>
    </div>
    <div class="table-wrap">
        <table class="data-table" id="requests-table">
            <thead>
            <tr>
                <th data-i18n="requests.subject">Subject</th>
                <th data-i18n="requests.from">From</th>
                <th data-i18n="requests.category">Category</th>
                <th data-i18n="common.status">Status</th>
                <th data-i18n="requests.created">Created</th>
                <th data-i18n="common.actions">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${requests}"
                th:attr="data-search=${item.subject + ' ' + item.fromUserName},
                         data-name=${item.subject}">
                <td th:text="${item.subject}">Subject</td>
                <td th:text="${item.fromUserName}">User</td>
                <td>
                    <span th:text="${item.category}">REQUEST</span>
                    <span th:if="${item.category.name() == 'GPA_VIEW'}" class="role-badge" style="margin-left:6px">GPA</span>
                </td>
                <td><span class="role-badge" th:text="${item.status}">OPEN</span></td>
                <td th:text="${item.createdAt}">—</td>
                <td><a class="btn btn-ghost" th:href="@{/admin/requests/{id}(id=${item.uuid})}" data-i18n="requests.open">Open</a></td>
            </tr>
            <tr th:if="${#lists.isEmpty(requests)}"><td colspan="6" data-i18n="requests.empty">No requests yet.</td></tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
