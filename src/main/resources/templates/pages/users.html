<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="page-toolbar">
        <div class="page-toolbar-main">
            <div>
                <h2 class="page-heading" data-i18n="users.title">Users</h2>
                <p class="muted" data-i18n="users.subtitle">Manage platform users · real-time online via WebSocket</p>
            </div>
            <div class="page-toolbar-actions">
                <div class="page-toolbar-left">
                    <input type="search"
                           class="search-input"
                           placeholder="Search name or email..."
                           data-i18n-placeholder="search.nameEmail"
                           data-table-search="users-table"
                           data-i18n-aria="users.title"
                           aria-label="Search users">
                    <form class="filter-bar" method="get" th:action="@{/admin/users}">
                        <select name="role" onchange="this.form.submit()" aria-label="Filter by role">
                            <option value="" data-i18n="filter.allRoles">All roles</option>
                            <option th:each="r : ${roleFilters}"
                                    th:value="${r}"
                                    th:selected="${selectedRole != null and selectedRole == r}"
                                    th:text="${T(com.project.school_management.dto.user.DataUser).displayRole(r)}">Teacher</option>
                        </select>
                        <select name="generation" onchange="this.form.submit()" aria-label="Filter by generation">
                            <option value="" data-i18n="filter.allGenerations">All generations</option>
                            <option th:each="g : ${generations}"
                                    th:value="${g}"
                                    th:selected="${selectedGeneration != null and selectedGeneration == g}"
                                    th:text="${'G' + g}">G9</option>
                        </select>
                    </form>
                </div>
                <div class="page-toolbar-right">
                    <a class="btn btn-dark"
                       sec:authorize="hasAuthority('USER_WRITE')"
                       th:href="@{/admin/users/new}"
                       data-i18n="users.add">Add Users</a>
                </div>
            </div>
        </div>
    </div>

    <nav class="alpha-filter" data-alpha-filter="users-table" role="toolbar"></nav>

    <div class="table-wrap">
        <table class="data-table" id="users-table">
            <thead>
            <tr>
                <th data-i18n="common.id">ID</th>
                <th data-i18n="common.photo">Photo</th>
                <th data-i18n="common.name">Name</th>
                <th data-i18n="common.email">Email</th>
                <th data-i18n="users.role">Role</th>
                <th data-i18n="users.grade">Grade</th>
                <th data-i18n="users.roomClass">Room / Class</th>
                <th data-i18n="users.salary">Salary</th>
                <th data-i18n="users.online">Online</th>
                <th data-i18n="common.status">Status</th>
                <th data-i18n="common.actions">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}"
                th:attr="data-search=${user.name + ' ' + user.email + ' ' + user.uuid},
                         data-name=${user.name},
                         data-user-email=${user.email}">
                <td>
                    <code class="id-chip"
                          th:title="${user.uuid}"
                          th:text="${#strings.substring(user.uuid.toString(),0,3) + '...'}">abc...</code>
                </td>
                <td>
                    <img th:if="${user.hasProfileImage}"
                         class="avatar-photo"
                         th:src="${user.profileImageUrl}"
                         th:alt="${user.name}">
                    <span th:unless="${user.hasProfileImage}"
                          class="avatar-circle"
                          th:text="${#strings.substring(user.name,0,1)}">U</span>
                </td>
                <td th:text="${user.name}">Name</td>
                <td th:text="${user.email}">email</td>
                <td>
                    <span class="role-badge"
                          th:classappend="${user.role != null} ? ' role-' + ${#strings.toLowerCase(user.role.name())} : ''"
                          th:text="${user.role}">ADMIN</span>
                </td>
                <td th:text="${user.grade} ?: '—'">Grade</td>
                <td>
                    <span th:if="${user.role != null and user.role.name() == 'TEACHER'}"
                          th:text="${user.room} ?: (user.classNames ?: '—')">Room</span>
                    <span th:if="${user.role != null and user.role.name() == 'STUDENT'}"
                          th:text="${user.classNames} ?: '—'">Class</span>
                    <span th:if="${user.role == null or (user.role.name() != 'TEACHER' and user.role.name() != 'STUDENT')}">—</span>
                </td>
                <td th:text="${user.salary != null} ? ${user.salary} : '—'">—</td>
                <td>
                    <span class="online-status"
                          th:classappend="${onlineEmails != null and #sets.contains(onlineEmails, user.email)} ? ' online' : ' offline'"
                          data-presence-email
                          th:attr="data-presence-email=${user.email}">
                        <span class="dot"></span>
                        <span class="presence-label"
                              th:text="${onlineEmails != null and #sets.contains(onlineEmails, user.email)} ? 'Online' : 'Offline'">Offline</span>
                    </span>
                </td>
                <td><span class="status-text status-active" data-i18n="users.active">Active</span></td>
                <td>
                    <div class="action-btns">
                        <a class="icon-action" title="View" th:href="@{/admin/users/{id}(id=${user.uuid})}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </a>
                        <a class="icon-action" title="Edit"
                           sec:authorize="hasAuthority('USER_WRITE')"
                           th:href="@{/admin/users/{id}/edit(id=${user.uuid})}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
                        </a>
                        <button type="button"
                                class="icon-action danger"
                                title="Delete"
                                sec:authorize="hasAuthority('USER_WRITE')"
                                data-confirm-open
                                th:attr="data-confirm-action=@{/admin/users/{id}/delete(id=${user.uuid})},
                                         data-confirm-message=${'Delete user ' + user.name + '?'}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                        </button>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="11" data-i18n="users.empty">No users found.</td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
