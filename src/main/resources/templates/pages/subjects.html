<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="page-toolbar">
        <div class="page-toolbar-main">
            <div>
                <h2 class="page-heading" data-i18n="subjects.title">Subjects</h2>
                <p class="muted" data-i18n="subjects.subtitle">Curriculum subjects for classes and scoring</p>
            </div>
            <div class="page-toolbar-actions">
                <div class="page-toolbar-left">
                    <input type="search" class="search-input" placeholder="Search name or code..."
                           data-i18n-placeholder="search.nameCode"
                           data-table-search="subjects-table" aria-label="Search subjects">
                </div>
                <div class="page-toolbar-right">
                    <a class="btn btn-dark" sec:authorize="hasAuthority('SUBJECT_WRITE')"
                       th:href="@{/admin/subjects/new}" data-i18n="subjects.add">Add Subject</a>
                </div>
            </div>
        </div>
    </div>

    <div class="table-wrap table-wrap-full">
        <table class="data-table data-table-fit" id="subjects-table">
            <thead>
            <tr>
                <th data-i18n="common.name">Name</th>
                <th data-i18n="subjects.code">Code</th>
                <th data-i18n="common.school">School</th>
                <th data-i18n="common.description">Description</th>
                <th data-i18n="common.actions">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${subjects}"
                th:attr="data-search=${item.name + ' ' + (item.code ?: '') + ' ' + (item.schoolName ?: '')},
                         data-name=${item.name}">
                <td th:text="${item.name}">Math</td>
                <td>
                    <code th:if="${item.code}" th:text="${item.code}">MATH</code>
                    <span th:unless="${item.code}" class="muted">—</span>
                </td>
                <td th:text="${item.schoolName} ?: '—'">School</td>
                <td th:text="${item.description} ?: '—'">—</td>
                <td>
                    <div class="action-btns">
                        <a class="icon-action" title="Edit" sec:authorize="hasAuthority('SUBJECT_WRITE')"
                           th:href="@{/admin/subjects/{id}/edit(id=${item.uuid})}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
                        </a>
                        <button type="button" class="icon-action danger" title="Delete"
                                sec:authorize="hasAuthority('SUBJECT_WRITE')"
                                data-confirm-open
                                th:attr="data-confirm-action=@{/admin/subjects/{id}/delete(id=${item.uuid})},
                                         data-confirm-message=${'Delete subject ' + item.name + '?'}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                        </button>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(subjects)}"><td colspan="5">No subjects yet. Add subjects to assign them to classes.</td></tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
