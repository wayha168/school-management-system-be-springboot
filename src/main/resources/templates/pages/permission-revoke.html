<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="page-toolbar">
        <div class="page-toolbar-main">
            <h2 class="page-heading">Revoke permissions</h2>
            <p class="muted">Select a role, then tick the permissions you want to remove</p>
            <div class="page-toolbar-actions row">
                <a class="btn btn-ghost" th:href="@{/admin/permissions}">Back</a>
            </div>
        </div>
    </div>
    <article class="form-card form-card-wide">
        <form th:action="@{/admin/permissions/revoke}" method="post" class="stack-form" data-permission-form>
            <label>Role
                <select name="roleUuid" required data-role-permission-select>
                    <option value="" disabled th:selected="${selectedRoleUuid == null}">Select role</option>
                    <option th:each="role : ${roles}"
                            th:value="${role.uuid}"
                            th:text="${role.name}"
                            th:selected="${selectedRoleUuid != null and selectedRoleUuid == role.uuid}">ADMIN</option>
                </select>
            </label>
            <div class="check-grid" data-permission-checks th:if="${selectedRoleUuid != null}">
                <label class="check-item" th:each="code : ${currentPermissions}">
                    <input type="checkbox" name="permissions" th:value="${code}"
                           th:attr="data-permission-code=${code}">
                    <span th:text="${code}">SCHOOL_READ</span>
                </label>
            </div>
            <p class="muted" th:if="${selectedRoleUuid == null}">Choose a role to see its permissions.</p>
            <p class="muted" th:if="${selectedRoleUuid != null and #sets.isEmpty(currentPermissions)}">This role has no permissions to revoke.</p>
            <div class="modal-actions">
                <a class="btn btn-ghost" th:href="@{/admin/permissions}">Cancel</a>
                <button type="submit" class="btn btn-danger-soft"
                        th:disabled="${selectedRoleUuid == null}">Revoke selected</button>
            </div>
        </form>
    </article>
</section>
</body>
</html>
