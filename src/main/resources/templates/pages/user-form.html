<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="page-toolbar">
        <div class="page-toolbar-main">
            <h2 class="page-heading" th:text="${mode == 'edit'} ? 'Edit User' : 'Add User'">Add User</h2>
            <p class="muted">Students: pick grade, then classes · Teachers: room + teaching classes</p>
            <div class="page-toolbar-actions row">
                <a class="btn btn-ghost" th:href="@{/admin/users}">Back</a>
            </div>
        </div>
    </div>

    <article class="form-card form-card-wide">
        <form th:action="${mode == 'edit'} ? @{/admin/users/{id}/update(id=${user.uuid})} : @{/admin/users}"
              method="post"
              enctype="multipart/form-data"
              class="form-grid"
              data-role-form
              data-image-upload-form>
            <div class="upload-grid span-3">
                <div class="upload-tile upload-tile-logo"
                     data-upload-tile>
                    <input type="file"
                           name="profileImage"
                           accept="image/png,image/jpeg,image/webp,image/gif"
                           hidden
                           data-upload-input>
                    <button type="button"
                            class="upload-preview upload-preview-logo"
                            data-upload-preview
                            data-upload-trigger
                            th:classappend="${user != null and user.hasProfileImage} ? ' has-image' : ''"
                            th:style="${user != null and user.hasProfileImage} ? 'background-image:url(' + user.profileImageUrl + ')' : null"
                            aria-label="Upload profile photo">
                        <span class="upload-placeholder" data-upload-placeholder th:if="${user == null or !user.hasProfileImage}">
                            <strong>Photo</strong>
                            <span>Click to upload</span>
                        </span>
                        <span class="upload-change">Change</span>
                    </button>
                    <div class="upload-meta">
                        <strong>Profile photo</strong>
                        <span data-upload-filename
                              th:text="${user != null and user.hasProfileImage} ? 'Current photo' : 'Optional · max 5MB'">Optional · max 5MB</span>
                    </div>
                </div>
            </div>

            <label>First name
                <input name="firstName" required
                       th:value="${user != null} ? ${user.firstName} : ''">
            </label>
            <label>Last name
                <input name="lastName" required
                       th:value="${user != null} ? ${user.lastName} : ''">
            </label>
            <label>Email
                <input type="email" name="email" required th:value="${user != null} ? ${user.email} : ''">
            </label>
            <label th:if="${mode != 'edit'}">Password
                <input type="password" name="password" minlength="6" required>
            </label>
            <label th:if="${mode == 'edit'}">Password
                <input type="password" name="password" minlength="6" placeholder="Leave blank to keep">
            </label>

            <label>Role
                <select name="roleUuid" required data-role-select>
                    <option value="" disabled th:selected="${user == null}">Select role</option>
                    <option th:each="role : ${roles}"
                            th:value="${role.uuid}"
                            th:text="${role.name}"
                            th:attr="data-role-name=${role.name.name()}"
                            th:selected="${user != null and user.roleUuid == role.uuid}">ADMIN</option>
                </select>
            </label>
            <label>School
                <select name="schoolUuid" required data-school-select>
                    <option value="" disabled th:selected="${user == null}">Select school</option>
                    <option th:each="school : ${schools}"
                            th:value="${school.uuid}"
                            th:text="${school.name}"
                            th:selected="${user != null and user.schoolUuid == school.uuid}">School</option>
                </select>
            </label>

            <label data-field-grade hidden>Grade (student)
                <select name="grade" data-grade-select>
                    <option value="">Select grade</option>
                    <option th:each="gr : ${grades}"
                            th:value="${gr}"
                            th:text="${gr}"
                            th:selected="${user != null and user.grade != null and user.grade == gr}">Grade 10</option>
                </select>
            </label>
            <label data-field-room hidden>Room (teacher)
                <input name="room" placeholder="e.g. Room A-12"
                       th:value="${user != null} ? ${user.room} : ''">
            </label>
            <label data-field-salary hidden>Salary
                <input type="number" name="salary" min="0" step="0.01" placeholder="Monthly salary"
                       th:value="${user != null and user.salary != null} ? ${user.salary} : ''">
            </label>

            <label class="span-3" data-field-class hidden>Classes
                <select name="classUuids" multiple size="5" data-class-select>
                    <option th:each="item : ${classes}"
                            th:value="${item.uuid}"
                            th:attr="data-class-grade=${item.grade}, data-class-school=${item.schoolUuid}"
                            th:text="${item.name + ' · ' + (item.grade ?: '—') + ' · ' + (item.generationCode ?: ('G' + item.generation)) + ' (' + item.schoolName + ')'}"
                            th:selected="${user != null and user.classes != null and !#lists.isEmpty(user.classes.?[uuid.equals(item.uuid)])}">Class</option>
                </select>
                <small class="muted" data-class-hint>Select role Student and a grade to see matching classes. Teachers see all school classes.</small>
            </label>

            <div class="modal-actions span-3">
                <a class="btn btn-ghost" th:href="@{/admin/users}">Cancel</a>
                <button type="submit" class="btn btn-dark" th:text="${mode == 'edit'} ? 'Save' : 'Create'">Create</button>
            </div>
        </form>
    </article>
</section>
</body>
</html>
