<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="page-toolbar">
        <div class="page-toolbar-main">
            <div>
                <h2 class="page-heading">Classes</h2>
                <p class="muted">Manage school classes</p>
            </div>
            <div class="page-toolbar-actions">
                <div class="page-toolbar-left">
                    <input type="search" class="search-input" placeholder="Search name or school..."
                           data-table-search="classes-table" aria-label="Search classes">
                    <form class="filter-bar" method="get" th:action="@{/admin/classes}">
                        <select name="grade" onchange="this.form.submit()" aria-label="Filter by grade">
                            <option value="">All grades</option>
                            <option th:each="gr : ${grades}"
                                    th:value="${gr}"
                                    th:selected="${selectedGrade != null and selectedGrade == gr}"
                                    th:text="${gr}">Grade 10</option>
                        </select>
                        <select name="generation" onchange="this.form.submit()" aria-label="Filter by generation">
                            <option value="">All generations</option>
                            <option th:each="g : ${generations}"
                                    th:value="${g}"
                                    th:selected="${selectedGeneration != null and selectedGeneration == g}"
                                    th:text="${'G' + g + ' · ' + g + (g == 1 ? 'st' : (g == 2 ? 'nd' : (g == 3 ? 'rd' : 'th'))) + ' generation'}">G9</option>
                        </select>
                    </form>
                </div>
                <div class="page-toolbar-right">
                    <a class="btn btn-dark" sec:authorize="hasAuthority('CLASS_WRITE')" th:href="@{/admin/classes/new}">Add Class</a>
                </div>
            </div>
        </div>
    </div>
    <div class="table-wrap">
        <table class="data-table" id="classes-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Photo</th>
                <th>Name</th>
                <th>Grade</th>
                <th>Generation</th>
                <th>School</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${classes}"
                th:attr="data-search=${item.name + ' ' + item.generation + ' ' + item.schoolName + ' ' + item.uuid}">
                <td><code class="id-chip" th:title="${item.uuid}" th:text="${#strings.substring(item.uuid.toString(),0,8)}">id</code></td>
                <td><span class="avatar-circle" th:text="${#strings.substring(item.name,0,1)}">C</span></td>
                <td th:text="${item.name}">Name</td>
                <td th:text="${item.grade} ?: '—'">Grade</td>
                <td>
                    <span class="gen-chip" th:text="${item.generationCode} ?: '—'">G9</span>
                    <span class="muted" th:text="${item.generationDisplay}">G9 · 9th generation</span>
                </td>
                <td th:text="${item.schoolName}">School</td>
                <td><span class="status-text status-active">Active</span></td>
                <td>
                    <div class="action-btns">
                        <a class="icon-action" title="View" th:href="@{/admin/classes/{id}(id=${item.uuid})}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </a>
                        <a class="icon-action" title="Edit" sec:authorize="hasAuthority('CLASS_WRITE')" th:href="@{/admin/classes/{id}/edit(id=${item.uuid})}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
                        </a>
                        <button type="button" class="icon-action danger" title="Delete"
                                sec:authorize="hasAuthority('CLASS_WRITE')"
                                data-confirm-open
                                th:attr="data-confirm-action=@{/admin/classes/{id}/delete(id=${item.uuid})},
                                         data-confirm-message=${'Delete class ' + item.name + '?'}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                        </button>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(classes)}"><td colspan="8">No classes yet.</td></tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
