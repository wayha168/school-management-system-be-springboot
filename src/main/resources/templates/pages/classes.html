<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="page-toolbar classes-toolbar">
        <div class="page-toolbar-main">
            <div class="classes-toolbar-head">
                <div>
                    <h2 class="page-heading" data-i18n="classes.title">Classes</h2>
                    <p class="muted" data-i18n="classes.subtitle">Manage school classes</p>
                </div>
                <a class="btn btn-dark" sec:authorize="hasAuthority('CLASS_WRITE')" th:href="@{/admin/classes/new}"
                   data-i18n="classes.add">Add Class</a>
            </div>
            <div class="classes-toolbar-filters">
                <input type="search" class="search-input" placeholder="Search name or school..."
                       data-i18n-placeholder="search.nameSchool"
                       data-card-search="classes-grid" aria-label="Search classes">
                <form class="filter-bar" method="get" th:action="@{/admin/classes}">
                    <select name="grade" onchange="this.form.submit()" aria-label="Filter by grade">
                        <option value="" data-i18n="filter.allGrades">All grades</option>
                        <option th:each="gr : ${grades}"
                                th:value="${gr}"
                                th:selected="${selectedGrade != null and selectedGrade == gr}"
                                th:text="${gr}">Grade 10</option>
                    </select>
                    <select name="generation" onchange="this.form.submit()" aria-label="Filter by generation">
                        <option value="" data-i18n="filter.allGenerations">All generations</option>
                        <option th:each="g : ${generations}"
                                th:value="${g}"
                                th:selected="${selectedGeneration != null and selectedGeneration == g}"
                                th:text="${'G' + g}">G9</option>
                    </select>
                </form>
            </div>
        </div>
    </div>

    <div class="class-card-grid" id="classes-grid">
        <article class="class-card"
                 th:each="item : ${classes}"
                 th:attr="data-search=${item.name + ' ' + (item.grade ?: '') + ' ' + (item.generationCode ?: '') + ' ' + (item.schoolName ?: '') + ' ' + (item.teachersLabel ?: '')},
                          data-name=${item.name}">
            <a class="class-card-hit"
               th:href="@{/admin/classes/{id}(id=${item.uuid})}"
               th:attr="aria-label=${'Open ' + item.name}"></a>

            <div class="class-card-body">
                <div class="class-card-top">
                    <span class="avatar-circle class-card-avatar"
                          th:text="${item.name != null and !#strings.isEmpty(item.name) ? #strings.substring(item.name,0,1) : 'C'}">M</span>
                    <div class="class-card-actions">
                        <a class="icon-action" title="Edit" sec:authorize="hasAuthority('CLASS_WRITE')"
                           th:href="@{/admin/classes/{id}/edit(id=${item.uuid})}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
                        </a>
                        <button type="button" class="icon-action danger" title="Delete"
                                sec:authorize="hasAuthority('CLASS_WRITE')"
                                data-confirm-open
                                th:attr="data-confirm-action=@{/admin/classes/{id}/delete(id=${item.uuid})},
                                         data-confirm-message=${'Delete class ' + item.name + '?'}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                        </button>
                    </div>
                </div>
                <h3 class="class-card-title" th:text="${item.name}">Mathematics</h3>
                <p class="class-card-meta">
                    <span th:text="${item.grade} ?: '—'">11</span>
                    <span class="gen-chip" th:text="${item.generationCode} ?: '—'">G9</span>
                </p>
                <p class="class-card-school" th:text="${item.schoolName} ?: '—'">Moey</p>
                <p class="class-card-teachers">
                    Belongs to:
                    <span th:text="${item.teachersLabel != null and item.teachersLabel != 'Unassigned' ? item.teachersLabel : 'Unassigned'}">Jennie Kim</span>
                </p>
            </div>
        </article>
        <p class="muted class-card-empty" th:if="${#lists.isEmpty(classes)}">No classes yet.</p>
    </div>
</section>
</body>
</html>
