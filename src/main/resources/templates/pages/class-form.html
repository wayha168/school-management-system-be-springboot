<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="page-toolbar">
        <div>
            <h2 class="page-heading" th:text="${mode == 'edit'} ? 'Edit Class' : 'Add Class'">Add Class</h2>
            <p class="muted">Set school, then assign teachers and subjects</p>
        </div>
        <a class="btn btn-ghost" th:href="@{/admin/classes}">Back</a>
    </div>

    <article class="form-card form-card-wide">
        <form th:action="${mode == 'edit'} ? @{/admin/classes/{id}/update(id=${item.uuid})} : @{/admin/classes}"
              method="post" class="form-grid" id="class-form">

            <label>Name
                <input name="name" required maxlength="120"
                       th:value="${item != null} ? ${item.name} : ''">
            </label>
            <label>Grade
                <input name="grade" placeholder="e.g. Grade 10"
                       th:value="${item != null} ? ${item.grade} : ''">
            </label>
            <label>Generation id
                <input type="number" name="generation" required min="1" max="100"
                       placeholder="e.g. 9 for G9"
                       th:value="${item != null} ? ${item.generation} : ''">
            </label>
            <label>Academic year
                <input type="number" name="academicYear" min="2000" max="2100"
                       placeholder="e.g. 2025"
                       th:value="${item != null} ? ${item.academicYear} : ${T(java.time.Year).now().value}">
            </label>

            <label class="span-3">School
                <select name="schoolUuid" id="class-school" required>
                    <option value="" disabled th:selected="${item == null}">Select school</option>
                    <option th:each="school : ${schools}"
                            th:value="${school.uuid}"
                            th:text="${school.name}"
                            th:selected="${item != null and item.schoolUuid == school.uuid}">School</option>
                </select>
            </label>

            <div class="span-3 class-assign-block">
                <div class="class-assign-head">
                    <div>
                        <strong>Teachers</strong>
                        <p class="muted">Shown for the selected school. Check one or more.</p>
                    </div>
                    <span class="muted" id="teacher-count">0 selected</span>
                </div>
                <div class="class-pick-list" id="teacher-pick-list">
                    <label class="class-pick-item"
                           th:each="t : ${teachers}"
                           th:attr="data-school-uuid=${t.schoolUuid}">
                        <input type="checkbox" name="teacherUuids"
                               th:value="${t.uuid}"
                               th:checked="${item != null and item.teacherUuids != null and item.teacherUuids.contains(t.uuid)}">
                        <span class="class-pick-body">
                            <strong th:text="${t.name}">Teacher</strong>
                            <small class="muted" th:text="${t.email}">email</small>
                        </span>
                    </label>
                    <p class="muted class-pick-empty" id="teacher-pick-empty" hidden>
                        Select a school to see teachers, or no teachers for this school.
                    </p>
                </div>
            </div>

            <div class="span-3 class-assign-block">
                <div class="class-assign-head">
                    <div>
                        <strong>Subjects</strong>
                        <p class="muted">Used in score sessions for this class.</p>
                    </div>
                    <button type="button" class="btn btn-ghost btn-sm" id="add-subject-row">Add subject</button>
                </div>
                <div class="class-subject-list" id="class-subjects-list">
                    <div class="class-subject-row" th:each="subj : ${item?.subjects}">
                        <input type="text" name="subjects" th:value="${subj}"
                               placeholder="e.g. Math" maxlength="80" autocomplete="off">
                        <button type="button" class="btn btn-ghost btn-sm remove-subject-row" title="Remove">Remove</button>
                    </div>
                    <div class="class-subject-row"
                         th:if="${item == null or item.subjects == null or #lists.isEmpty(item.subjects)}">
                        <input type="text" name="subjects" placeholder="e.g. Math" maxlength="80" autocomplete="off">
                        <button type="button" class="btn btn-ghost btn-sm remove-subject-row" title="Remove">Remove</button>
                    </div>
                </div>
            </div>

            <div class="modal-actions span-3">
                <a class="btn btn-ghost" th:href="@{/admin/classes}">Cancel</a>
                <button type="submit" class="btn btn-dark" th:text="${mode == 'edit'} ? 'Save' : 'Create'">Create</button>
            </div>
        </form>
    </article>

    <template id="subject-row-template">
        <div class="class-subject-row">
            <input type="text" name="subjects" placeholder="e.g. Math" maxlength="80" autocomplete="off">
            <button type="button" class="btn btn-ghost btn-sm remove-subject-row" title="Remove">Remove</button>
        </div>
    </template>

    <script>
        (function () {
            const schoolSelect = document.getElementById('class-school');
            const pickList = document.getElementById('teacher-pick-list');
            const emptyEl = document.getElementById('teacher-pick-empty');
            const countEl = document.getElementById('teacher-count');
            const subjectList = document.getElementById('class-subjects-list');
            const subjectTemplate = document.getElementById('subject-row-template');
            const addSubjectBtn = document.getElementById('add-subject-row');
            if (!schoolSelect || !pickList) return;

            function updateTeacherCount() {
                const n = pickList.querySelectorAll('.class-pick-item:not([hidden]) input[type="checkbox"]:checked').length;
                if (countEl) countEl.textContent = n + ' selected';
            }

            function filterTeachers() {
                const schoolId = schoolSelect.value || '';
                let visible = 0;
                pickList.querySelectorAll('.class-pick-item').forEach((item) => {
                    const itemSchool = item.getAttribute('data-school-uuid') || '';
                    const match = schoolId !== '' && itemSchool === schoolId;
                    item.hidden = !match;
                    if (!match) {
                        const cb = item.querySelector('input[type="checkbox"]');
                        if (cb) cb.checked = false;
                    } else {
                        visible += 1;
                    }
                });
                if (emptyEl) emptyEl.hidden = visible > 0;
                updateTeacherCount();
            }

            schoolSelect.addEventListener('change', filterTeachers);
            pickList.addEventListener('change', (e) => {
                if (e.target && e.target.matches('input[type="checkbox"]')) updateTeacherCount();
            });
            filterTeachers();

            if (subjectList && subjectTemplate && addSubjectBtn) {
                addSubjectBtn.addEventListener('click', () => {
                    subjectList.appendChild(subjectTemplate.content.cloneNode(true));
                    const input = subjectList.querySelector('.class-subject-row:last-child input[name="subjects"]');
                    if (input) input.focus();
                });

                subjectList.addEventListener('click', (e) => {
                    const btn = e.target.closest('.remove-subject-row');
                    if (!btn) return;
                    const row = btn.closest('.class-subject-row');
                    if (!row) return;
                    const rows = subjectList.querySelectorAll('.class-subject-row');
                    if (rows.length === 1) {
                        const input = row.querySelector('input[name="subjects"]');
                        if (input) input.value = '';
                        return;
                    }
                    row.remove();
                });
            }
        })();
    </script>
</section>
</body>
</html>
