<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="page-toolbar">
        <div class="page-toolbar-main">
            <div>
                <h2 class="page-heading">Permissions</h2>
                <p class="muted">View role–permission matrix</p>
            </div>
            <div class="page-toolbar-actions">
                <div class="page-toolbar-left">
                    <input type="search"
                           class="search-input"
                           placeholder="Search permission..."
                           data-table-search="permissions-table"
                           aria-label="Search permissions">
                </div>
                <div class="page-toolbar-right">
                    <a class="btn btn-ghost" sec:authorize="hasAuthority('ROLES_WRITE')"
                       th:href="@{/admin/permissions/assign}">Assign</a>
                    <a class="btn btn-ghost" sec:authorize="hasAuthority('ROLES_WRITE')"
                       th:href="@{/admin/permissions/revoke}">Revoke</a>
                    <a class="btn btn-dark" sec:authorize="hasAuthority('ROLES_WRITE')"
                       th:href="@{/admin/permissions/replace}">Replace</a>
                </div>
            </div>
        </div>
    </div>

    <div class="table-wrap">
        <table class="data-table" id="permissions-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Code</th>
                <th>Module</th>
                <th>Action</th>
                <th>Status</th>
                <th>Assigned roles</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item, stat : ${permissions}"
                th:attr="data-search=${item.code + ' ' + item.module + ' ' + item.action}">
                <td><code class="id-chip" th:text="${stat.count}">1</code></td>
                <td><code th:text="${item.code}">SCHOOL_READ</code></td>
                <td th:text="${item.module}">SCHOOL</td>
                <td th:text="${item.action}">READ</td>
                <td><span class="status-text status-active" th:text="${item.status}">Active</span></td>
                <td>
                    <div class="chips" th:if="${!#lists.isEmpty(item.roles)}">
                        <span class="role-badge"
                              th:each="roleName : ${item.roles}"
                              th:classappend="' role-' + ${#strings.toLowerCase(roleName)}"
                              th:text="${roleName}">ADMIN</span>
                    </div>
                    <span class="muted" th:if="${#lists.isEmpty(item.roles)}">—</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(permissions)}">
                <td colspan="6">No permissions found.</td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
