<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="page-toolbar">
        <div class="page-toolbar-main">
            <div>
                <h2 class="page-heading">Schools</h2>
                <p class="muted">Manage schools on the platform</p>
            </div>
            <div class="page-toolbar-actions">
                <div class="page-toolbar-left">
                    <input type="search" class="search-input" placeholder="Search name or email..."
                           data-table-search="schools-table" aria-label="Search schools">
                </div>
                <div class="page-toolbar-right">
                    <a class="btn btn-dark" sec:authorize="hasAuthority('SCHOOL_WRITE')" th:href="@{/admin/schools/new}">Add School</a>
                </div>
            </div>
        </div>
    </div>

    <div class="table-wrap">
        <table class="data-table" id="schools-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Photo</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="school : ${schools}"
                th:attr="data-search=${school.name + ' ' + school.email + ' ' + school.uuid}">
                <td><code class="id-chip" th:title="${school.uuid}" th:text="${#strings.substring(school.uuid.toString(),0,8)}">id</code></td>
                <td>
                    <img th:if="${school.hasLogo}"
                         class="avatar-photo"
                         th:src="${school.logoUrl}"
                         th:alt="${school.name}">
                    <span th:unless="${school.hasLogo}"
                          class="avatar-circle"
                          th:text="${#strings.substring(school.name,0,1)}">S</span>
                </td>
                <td th:text="${school.name}">Name</td>
                <td th:text="${school.email}">email</td>
                <td th:text="${school.phone}">phone</td>
                <td><span class="status-text status-active">Active</span></td>
                <td>
                    <div class="action-btns">
                        <a class="icon-action" title="View" th:href="@{/admin/schools/{id}(id=${school.uuid})}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </a>
                        <a class="icon-action" title="Edit" sec:authorize="hasAuthority('SCHOOL_WRITE')" th:href="@{/admin/schools/{id}/edit(id=${school.uuid})}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
                        </a>
                        <button type="button" class="icon-action danger" title="Delete"
                                sec:authorize="hasAuthority('SCHOOL_WRITE')"
                                data-confirm-open
                                th:attr="data-confirm-action=@{/admin/schools/{id}/delete(id=${school.uuid})},
                                         data-confirm-message=${'Delete school ' + school.name + '?'}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                        </button>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(schools)}"><td colspan="7">No schools yet.</td></tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
