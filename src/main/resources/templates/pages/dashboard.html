<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section th:fragment="section">
    <div class="page-intro">
        <div>
            <h2 class="section-title">Dashboard Overview</h2>
            <p class="muted">Live summary of schools, people, and access controls.</p>
        </div>
        <span class="live-badge"><span class="live-dot"></span> Live</span>
    </div>

    <div class="summary-grid">
        <article class="summary-card">
            <div class="summary-icon tone-blue">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6"/></svg>
            </div>
            <div>
                <span class="summary-label">Schools</span>
                <p class="summary-value" th:text="${schoolCount}">0</p>
            </div>
        </article>
        <article class="summary-card">
            <div class="summary-icon tone-green">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            </div>
            <div>
                <span class="summary-label">Classes</span>
                <p class="summary-value" th:text="${classCount}">0</p>
            </div>
        </article>
        <article class="summary-card">
            <div class="summary-icon tone-purple">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <div>
                <span class="summary-label">Registered Users</span>
                <p class="summary-value" th:text="${userCount}">0</p>
            </div>
        </article>
        <article class="summary-card">
            <div class="summary-icon tone-teal">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            </div>
            <div>
                <span class="summary-label">Teachers</span>
                <p class="summary-value" th:text="${teacherCount}">0</p>
            </div>
        </article>
        <article class="summary-card">
            <div class="summary-icon tone-orange">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
            </div>
            <div>
                <span class="summary-label">Students</span>
                <p class="summary-value" th:text="${studentCount}">0</p>
            </div>
        </article>
        <article class="summary-card">
            <div class="summary-icon tone-slate">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
            </div>
            <div>
                <span class="summary-label">Staff</span>
                <p class="summary-value" th:text="${staffCount}">0</p>
            </div>
        </article>
    </div>

    <div class="chart-grid">
        <article class="panel-card chart-card">
            <div class="page-intro compact">
                <div>
                    <h3 class="section-title">People statistics</h3>
                    <p class="muted">Users, teachers, students and staff</p>
                </div>
            </div>
            <canvas id="peopleChart"></canvas>
        </article>
        <article class="panel-card chart-card">
            <div class="page-intro compact">
                <div>
                    <h3 class="section-title">Students vs teachers</h3>
                    <p class="muted">Quick role comparison</p>
                </div>
            </div>
            <canvas id="roleChart"></canvas>
        </article>
    </div>

    <script th:inline="javascript">
        window.__dashboardCharts = {
            labels: /*[[${chartLabels}]]*/ [],
            values: /*[[${chartValues}]]*/ [],
            teachers: /*[[${teacherCount}]]*/ 0,
            students: /*[[${studentCount}]]*/ 0
        };
    </script>
</section>
</body>
</html>
