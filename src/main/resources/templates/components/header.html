<header class="header" th:fragment="header"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="header-leading">
        <button type="button"
                class="icon-btn sidebar-toggle"
                data-sidebar-toggle
                data-i18n-aria="header.openMenu"
                data-i18n-title="header.openMenu"
                aria-label="Open menu"
                title="Open menu"
                aria-controls="admin-sidebar"
                aria-expanded="false">
            <svg class="sidebar-toggle-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            <svg class="sidebar-toggle-close" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" hidden>
                <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
        </button>
        <div class="header-title">
            <p class="header-eyebrow" th:text="${pageTitle}">Dashboard</p>
            <h1 th:text="${account != null ? account.roleDisplay : 'Account'}">Account</h1>
        </div>
    </div>

    <div class="header-actions" th:if="${account != null}">
        <div th:replace="~{components/prefs-switch :: prefs}"></div>
        <span class="online-pill" title="Users online right now">
            <span class="dot online-dot"></span>
            <strong data-online-count th:text="${onlineCount != null} ? ${onlineCount} : '0'">0</strong>
            <span data-i18n="header.online">online</span>
        </span>
        <button type="button"
                class="icon-btn icon-btn-notif"
                data-notifications-open
                data-i18n-aria="header.notifications"
                data-i18n-title="header.notifications"
                aria-label="Notifications"
                title="Notifications"
                aria-haspopup="dialog"
                aria-controls="notifications-drawer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span class="notif-badge" data-notif-badge hidden>0</span>
        </button>

        <div class="profile-menu" data-profile-menu>
            <button type="button"
                    class="profile-trigger btn btn-soft"
                    data-profile-toggle
                    aria-haspopup="true"
                    aria-expanded="false">
                <img th:if="${account.hasProfileImage}"
                     class="profile-avatar profile-avatar-img"
                     th:src="${account.profileImageUrl}"
                     th:alt="${account.name}">
                <span th:unless="${account.hasProfileImage}"
                      class="profile-avatar"
                      th:classappend="' avatar-' + ${account.roleCss()}"
                      th:text="${#strings.substring(account.name,0,1)}">A</span>
                <span class="profile-meta">
                    <strong th:text="${account.name}">User</strong>
                    <small th:text="${account.roleDisplay}">Role</small>
                </span>
                <svg class="profile-caret" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>

            <div class="profile-dropdown" data-profile-dropdown hidden>
                <div class="profile-dropdown-head">
                    <div class="profile-dropdown-identity">
                        <img th:if="${account.hasProfileImage}"
                             class="profile-avatar profile-avatar-img profile-avatar-lg"
                             th:src="${account.profileImageUrl}"
                             th:alt="${account.name}">
                        <span th:unless="${account.hasProfileImage}"
                              class="profile-avatar profile-avatar-lg"
                              th:classappend="' avatar-' + ${account.roleCss()}"
                              th:text="${#strings.substring(account.name,0,1)}">A</span>
                        <div>
                            <p class="profile-dropdown-name" th:text="${account.name}">User</p>
                            <p class="profile-dropdown-email" th:text="${account.email}">user@school.com</p>
                        </div>
                    </div>
                    <span class="role-badge"
                          th:classappend="' role-' + ${account.roleCss()}"
                          th:text="${account.roleDisplay}">Role</span>
                </div>

                <div class="profile-dropdown-body">
                    <p>
                        <span data-i18n="header.role">Role</span>
                        <strong th:text="${account.roleDisplay}">Role</strong>
                    </p>
                    <p>
                        <span data-i18n="header.school">School</span>
                        <strong th:text="${account.schoolName} ?: '—'">School</strong>
                    </p>

                    <!-- Teacher / Principal: classes they teach or manage -->
                    <p th:if="${account.role != null and (account.role.name() == 'TEACHER' or account.role.name() == 'PRINCIPAL')}">
                        <span th:if="${account.role.name() == 'TEACHER'}" data-i18n="header.teaching">Teaching</span>
                        <span th:unless="${account.role.name() == 'TEACHER'}" data-i18n="header.classes">Classes</span>
                        <strong th:text="${account.classNames} ?: '—'">—</strong>
                    </p>
                    <p th:if="${account.role != null and account.role.name() == 'TEACHER' and account.room != null}">
                        <span data-i18n="header.room">Room</span>
                        <strong th:text="${account.room}">Room</strong>
                    </p>

                    <!-- Student: grade + enrolled classes -->
                    <p th:if="${account.role != null and account.role.name() == 'STUDENT'}">
                        <span data-i18n="header.grade">Grade</span>
                        <strong th:text="${account.grade} ?: '—'">—</strong>
                    </p>
                    <p th:if="${account.role != null and account.role.name() == 'STUDENT'}">
                        <span data-i18n="header.classes">Classes</span>
                        <strong th:text="${account.classNames} ?: '—'">—</strong>
                    </p>

                    <!-- Staff -->
                    <p th:if="${account.role != null and account.role.name() == 'STAFF' and account.room != null}">
                        <span data-i18n="header.room">Room</span>
                        <strong th:text="${account.room}">—</strong>
                    </p>
                </div>

                <div class="profile-dropdown-actions">
                    <a class="btn btn-ghost btn-block"
                       sec:authorize="hasAuthority('USER_READ')"
                       th:href="@{/admin/users/{id}(id=${account.uuid})}"
                       data-i18n="header.profile">View my profile</a>
                    <a class="btn btn-ghost btn-block" th:href="@{/admin/dashboard}"
                       data-i18n="header.dashboard">View dashboard</a>
                    <form th:action="@{/logout}" method="post">
                        <button class="btn btn-danger-soft btn-block" type="submit"
                                data-i18n="header.logout">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</header>
