<div class="prefs-switch" th:fragment="prefs"
     xmlns:th="http://www.thymeleaf.org">
    <button type="button"
            class="icon-btn prefs-theme-btn"
            data-theme-toggle
            aria-label="Toggle theme"
            title="Theme">
        <svg class="prefs-icon prefs-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="prefs-icon prefs-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3 7 7 0 1 0 21 14.5z"/>
        </svg>
    </button>

    <div class="prefs-lang" data-lang-menu>
        <button type="button"
                class="prefs-lang-trigger"
                data-lang-toggle
                aria-haspopup="listbox"
                aria-expanded="false"
                title="Language">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="12" cy="12" r="10"/>
                <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            <span class="prefs-lang-current" data-lang-label>EN</span>
            <svg class="prefs-lang-caret" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        </button>
        <div class="prefs-lang-dropdown" data-lang-dropdown hidden role="listbox">
            <button type="button" class="prefs-lang-option" role="option" data-lang-option="en" aria-selected="false">
                English
            </button>
            <button type="button" class="prefs-lang-option" role="option" data-lang-option="km" aria-selected="false">
                ខ្មែរ
            </button>
        </div>
    </div>
</div>
