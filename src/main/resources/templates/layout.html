<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout (content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | School Management'">School Management</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="admin-body"
      th:attr="data-flash-success=${success}, data-flash-error=${error}">
<div class="admin-shell">
    <aside th:replace="~{components/sidebar :: sidebar}"></aside>
    <div class="admin-main">
        <header th:replace="~{components/header :: header}"></header>
        <main class="admin-content" th:insert="${content}"></main>
    </div>
</div>

<!-- Confirm modal only -->
<div class="modal-backdrop" id="confirm-modal" hidden>
    <div class="modal-card modal-sm" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
        <div class="modal-head">
            <h3 id="confirm-title">Confirm</h3>
            <button type="button" class="icon-action" data-confirm-close aria-label="Close">&times;</button>
        </div>
        <p id="confirm-message" class="confirm-text">Are you sure?</p>
        <form id="confirm-form" method="post" th:action="@{/admin/dashboard}" class="modal-actions">
            <button type="button" class="btn btn-ghost" data-confirm-close>Cancel</button>
            <button type="submit" class="btn btn-danger-soft">Confirm</button>
        </form>
    </div>
</div>

<div id="toast-host" class="toast-host" aria-live="polite"></div>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:src="@{/js/header-profile.js}"></script>
<script th:src="@{/js/toast.js}"></script>
<script th:src="@{/js/admin-crud.js}"></script>
<script th:src="@{/js/presence.js}"></script>
</body>
</html>
