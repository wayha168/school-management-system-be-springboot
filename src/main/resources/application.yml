spring:
  application:
    name: school-management
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.r2dbc.R2dbcAutoConfiguration
      - org.springframework.boot.r2dbc.autoconfigure.R2dbcAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.session.data.redis.autoconfigure.SessionRedisAutoConfiguration
      - org.springframework.boot.autoconfigure.session.SessionAutoConfiguration
      - org.springframework.boot.security.oauth2.server.authorization.autoconfigure.OAuth2AuthorizationServerAutoConfiguration
      - org.springframework.boot.security.oauth2.server.authorization.autoconfigure.servlet.OAuth2AuthorizationServerAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.server.servlet.OAuth2AuthorizationServerAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/school-management
    username: postgres
    password: "0508"
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: true
  docker:
    compose:
      enabled: false
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 250MB
      max-request-size: 260MB
      enabled: true

server:
  port: 8080
  servlet:
    session:
      tracking-modes: cookie

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  show-actuator: false

app:
  seed:
    superadmin-email: superadmin@school.com
    superadmin-password: superadmin123
    admin-email: admin@school.com
    admin-password: admin123
  jwt:
    secret: "school-management-jwt-secret-key-change-me-32bytes-min"
    expiration-ms: 86400000
  assessment:
    base-url: ${APP_ASSESSMENT_BASE_URL:http://localhost:8081}
    internal-key: ${APP_ASSESSMENT_INTERNAL_KEY:assessment-internal-key-change-me}
  assignment:
    base-url: ${APP_ASSIGNMENT_BASE_URL:http://localhost:8082}
    internal-key: ${APP_ASSIGNMENT_INTERNAL_KEY:assignment-internal-key-change-me}
