spring:
  application:
    name: assignment-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/school-assignment}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:0508}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true
  servlet:
    multipart:
      max-file-size: 250MB
      max-request-size: 260MB
      enabled: true

server:
  port: 8082

app:
  jwt:
    secret: ${APP_JWT_SECRET:school-management-jwt-secret-key-change-me-32bytes-min}
  internal-key: ${APP_INTERNAL_KEY:assignment-internal-key-change-me}
  recordings:
    dir: ${APP_RECORDINGS_DIR:./data/recordings}
  submissions:
    dir: ${APP_SUBMISSIONS_DIR:./data/submissions}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
