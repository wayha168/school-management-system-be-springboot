
services:
  assessment-service:
    build:
      context: ./assessment-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/school-assessment
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "0508"
      APP_JWT_SECRET: school-management-jwt-secret-key-change-me-32bytes-min
      APP_INTERNAL_KEY: assessment-internal-key-change-me
    restart: unless-stopped

  assignment-service:
    build:
      context: ./assignment-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/school-assignment
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "0508"
      APP_JWT_SECRET: school-management-jwt-secret-key-change-me-32bytes-min
      APP_INTERNAL_KEY: assignment-internal-key-change-me
      APP_RECORDINGS_DIR: /data/recordings
      APP_SUBMISSIONS_DIR: /data/submissions
    volumes:
      - assignment-recordings:/data/recordings
      - assignment-submissions:/data/submissions
    restart: unless-stopped

  school-management:
    build:
      context: .
      dockerfile: docker/Dockerfile.school-management
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/school-management
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "0508"
      APP_ASSESSMENT_BASE_URL: http://assessment-service:8081
      APP_ASSESSMENT_INTERNAL_KEY: assessment-internal-key-change-me
      APP_ASSIGNMENT_BASE_URL: http://assignment-service:8082
      APP_ASSIGNMENT_INTERNAL_KEY: assignment-internal-key-change-me
      APP_JWT_SECRET: school-management-jwt-secret-key-change-me-32bytes-min
    depends_on:
      - assessment-service
      - assignment-service
    restart: unless-stopped

volumes:
  assignment-recordings:
  assignment-submissions:
